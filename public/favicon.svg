           transform="rotate(-25 48 118)" fill="url(#ng)"/>

  <!-- S -->
  <text x="93" y="128"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="bold" font-size="112"
        fill="url(#sg)">S</text>
